name: Deploy wiki
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install akwiki
        run: |
          curl -fsSL https://github.com/kyungw00k/akwiki/releases/latest/download/akwiki-linux-amd64 -o akwiki
          chmod +x akwiki
      - name: Build
        run: ./akwiki build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
