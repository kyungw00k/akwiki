name: Deploy Demo to Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'theme/**'
      - 'internal/**'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git log 전체 (날짜 추출)

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build akwiki
        run: |
          go build -ldflags "-s -w -X github.com/kyungw00k/akwiki/internal/cli.Version=$(git describe --tags --always)" -o akwiki ./cmd/akwiki

      - name: Build demo wiki
        working-directory: demo
        run: ../akwiki build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
